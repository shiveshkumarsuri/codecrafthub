<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #8B5CF6;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1em;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .card h2 {
            color: #1f2937;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #8B5CF6;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input, textarea, select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success:hover:not(:disabled) {
            background: #d97706;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .course-card {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #8B5CF6;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .course-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .course-date {
            font-size: 0.85em;
            color: #6b7280;
        }

        .course-description {
            color: #4b5563;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .course-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: white;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-not-started {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .course-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #8B5CF6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #374151;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            margin: 0;
            color: #1f2937;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            color: #6b7280;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #1f2937;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }

            header {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📚 CodeCraftHub</h1>
        <p class="subtitle">Your Learning Management Platform</p>
    </header>

    <div id="messageContainer"></div>

    <div class="card">
        <h2>➕ Add New Course</h2>
        <form id="addCourseForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Course Name *</label>
                    <input type="text" id="name" name="name" required placeholder="e.g., JavaScript Fundamentals">
                </div>
                <div class="form-group">
                    <label for="target_date">Target Date *</label>
                    <input type="date" id="target_date" name="target_date" required>
                </div>
                <div class="form-group">
                    <label for="status">Status *</label>
                    <select id="status" name="status" required>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" required placeholder="Enter course description..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="addCourseBtn">
                <span>Add Course</span>
            </button>
        </form>
    </div>

    <div class="card">
        <h2>📋 My Courses</h2>
        <div class="loading" id="loadingSpinner">
            <div class="spinner"></div>
            <p>Loading courses...</p>
        </div>
        <div id="coursesContainer"></div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>✏️ Edit Course</h2>
            <button class="close-btn" onclick="closeEditModal()">&times;</button>
        </div>
        <form id="editCourseForm">
            <input type="hidden" id="edit_id" name="id">
            <div class="form-grid">
                <div class="form-group">
                    <label for="edit_name">Course Name *</label>
                    <input type="text" id="edit_name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="edit_target_date">Target Date *</label>
                    <input type="date" id="edit_target_date" name="target_date" required>
                </div>
                <div class="form-group">
                    <label for="edit_status">Status *</label>
                    <select id="edit_status" name="status" required>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="edit_description">Description *</label>
                    <textarea id="edit_description" name="description" required></textarea>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="updateCourseBtn">
                <span>Update Course</span>
            </button>
        </form>
    </div>
</div>

<script>
    const API_BASE_URL = '/api/courses';
    let courses = [];

    function showMessage(message, type = 'success') {
        const container = document.getElementById('messageContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = message;
        container.innerHTML = '';
        container.appendChild(messageDiv);
        messageDiv.classList.add('show');

        setTimeout(() => {
            messageDiv.classList.remove('show');
            setTimeout(() => messageDiv.remove(), 300);
        }, 4000);
    }

    function showLoading(show) {
        const spinner = document.getElementById('loadingSpinner');
        if (show) {
            spinner.classList.add('show');
        } else {
            spinner.classList.remove('show');
        }
    }

    function formatDate(dateString) {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(dateString).toLocaleDateString(undefined, options);
    }

    function getStatusClass(status) {
        const statusMap = {
            'Not Started': 'status-not-started',
            'In Progress': 'status-in-progress',
            'Completed': 'status-completed'
        };
        return statusMap[status] || 'status-not-started';
    }

    async function fetchCourses() {
        showLoading(true);
        try {
            const response = await fetch(API_BASE_URL);
            if (!response.ok) {
                throw new Error(`Failed to fetch courses: ${response.statusText}`);
            }
            const data = await response.json();
            courses = Array.isArray(data.courses) ? data.courses : [];
            renderCourses();
        } catch (error) {
            console.error('Error fetching courses:', error);
            showMessage(`Error loading courses: ${error.message}`, 'error');
            document.getElementById('coursesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Unable to load courses</h3>
                        <p>Please make sure the backend API is running at ${API_BASE_URL}</p>
                    </div>
                `;
        } finally {
            showLoading(false);
        }
    }

    function renderCourses() {
        const container = document.getElementById('coursesContainer');

        if (courses.length === 0) {
            container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>No courses yet</h3>
                        <p>Add your first course using the form above!</p>
                    </div>
                `;
            return;
        }

        container.innerHTML = `
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <div class="course-header">
                                <div>
                                    <div class="course-title">${escapeHtml(course.name)}</div>
                                    <div class="course-date">Created: ${formatDate(course.created_at)}</div>
                                </div>
                            </div>
                            <div class="course-description">${escapeHtml(course.description)}</div>
                            <div class="course-meta">
                                <div class="meta-item">
                                    📅 Target: ${formatDate(course.target_date)}
                                </div>
                                <span class="status-badge ${getStatusClass(course.status)}">
                                    ${course.status}
                                </span>
                            </div>
                            <div class="course-actions">
                                <button class="btn-success" onclick="openEditModal(${course.id})">
                                    ✏️ Edit
                                </button>
                                <button class="btn-danger" onclick="deleteCourse(${course.id})">
                                    🗑️ Remove
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        const btn = document.getElementById('addCourseBtn');

        btn.disabled = true;
        btn.innerHTML = '<span>Adding...</span>';

        try {
            const response = await fetch(API_BASE_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                throw new Error(`Failed to add course: ${response.statusText}`);
            }

            const result = await response.json();
            const newCourse = result.course;
            if (!newCourse) {
                throw new Error('Backend response did not include a course payload');
            }
            courses.push(newCourse);
            renderCourses();
            form.reset();
            showMessage('✅ Course added successfully!', 'success');
        } catch (error) {
            console.error('Error adding course:', error);
            showMessage(`❌ Error adding course: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<span>Add Course</span>';
        }
    });

    function openEditModal(id) {
        const course = courses.find(c => c.id === id);
        if (!course) return;

        document.getElementById('edit_id').value = course.id;
        document.getElementById('edit_name').value = course.name;
        document.getElementById('edit_description').value = course.description;
        document.getElementById('edit_target_date').value = course.target_date;
        document.getElementById('edit_status').value = course.status;

        document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('show');
    }

    document.getElementById('editModal').addEventListener('click', (e) => {
        if (e.target.id === 'editModal') {
            closeEditModal();
        }
    });

    document.getElementById('editCourseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        const id = data.id;
        delete data.id;

        const btn = document.getElementById('updateCourseBtn');
        btn.disabled = true;
        btn.innerHTML = '<span>Updating...</span>';

        try {
            const response = await fetch(`${API_BASE_URL}/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                throw new Error(`Failed to update course: ${response.statusText}`);
            }

            const result = await response.json();
            const updatedCourse = result.course;
            if (!updatedCourse) {
                throw new Error('Backend response did not include a course payload');
            }
            const index = courses.findIndex(c => c.id === parseInt(id));
            if (index !== -1) {
                courses[index] = updatedCourse;
            }
            renderCourses();
            closeEditModal();
            showMessage('✅ Course updated successfully!', 'success');
        } catch (error) {
            console.error('Error updating course:', error);
            showMessage(`❌ Error updating course: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<span>Update Course</span>';
        }
    });

    async function deleteCourse(id) {
        if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/${id}`, {
                method: 'DELETE'
            });

            if (!response.ok) {
                throw new Error(`Failed to delete course: ${response.statusText}`);
            }

            courses = courses.filter(c => c.id !== id);
            renderCourses();
            showMessage('✅ Course deleted successfully!', 'success');
        } catch (error) {
            console.error('Error deleting course:', error);
            showMessage(`❌ Error deleting course: ${error.message}`, 'error');
        }
    }

    fetchCourses();
</script>
</body>
</html>
